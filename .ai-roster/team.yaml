# .ai-roster/team.yaml
# SINGLE SOURCE OF TRUTH for the Tekram assessment multi-agent, GitHub-issue-driven workflow.
# Full workflow documentation (roles, pipelines, steps): .ai-roster/README.md
# Sync to runtimes with:  node .ai-roster/scripts/sync-agents.js   (needs js-yaml, in package.json)
#   environment: claude-code  -> .claude/agents/<id>.md   (true subagents, fresh context)
#   environment: opencode     -> .opencode/agents/<id>.md (markdown + YAML frontmatter)
#   environment: antigravity  -> .agents/agents/<id>/agent.json  (RETIRED — no roles use it since
#     QA moved to claude-code on 2026-07-09, TD-007; emitter kept in sync-agents.js in case a
#     role ever returns to that runtime, but its model ids/permission schema remain UNVERIFIED)
#
# Claude Code `model:` frontmatter takes SHORT aliases (opus | sonnet | haiku), not the long
# `claude-opus-4-8-thinking` strings. Use `claude_model_alias` for claude-code agents.
# `claude_effort` maps to the frontmatter `effort:` field (low|medium|high|xhigh|max) — on this
# runtime thinking depth follows effort, so there is no separate thinking knob.
#
# opencode `model:` frontmatter takes a fully-qualified `provider/model-id` string (e.g.
# `deepseek/deepseek-v4-flash`). Use `opencode_model` for opencode agents. The `deepseek`
# provider itself is declared in `opencode.json` at the repo root (baseURL + model ids).
#
# `write_scope: [<globs>]` is a runtime-agnostic field: "this agent should only write inside these
# globs." Enforcement level depends on what each runtime actually supports:
#   - opencode:     HARD — permission.edit allows those globs, "ask" (interactive founder approval)
#                    everywhere else; read/external_directory is allowed project-wide (including the
#                    shared worktree root + /tmp below) so it never prompts for read permission.
#   - claude-code:   SOFT — no per-agent path-glob permission exists in subagent frontmatter, so
#                    this is written into the agent body as a documented rule, same guarantee class
#                    as prose rules already in the instructions files.
#                    Delegation is blocked by omitting Agent/Task from `tools:` (the default).
# See buildOpencodePermission()/emitClaudeAgent() in sync-agents.js.

agents:
  # ── Orchestration (priorities/gates only — no code, no dispatch) ────────────
  pm-orchestrator:
    display_name: "PM — Orchestrator (priorities & gates)"
    stage: "cross-cutting: priority + gate ownership, not a pipeline stage"
    environment: "claude-code"
    claude_model_alias: "opus"
    tools: ["Read", "Grep", "Glob", "Bash"]   # no Agent/Task — directs via priority/scope calls, doesn't spawn
    instructions_file: "pm_orchestrator_instructions.md"

  # ── Code-issue orchestrator (fetches, briefs, verifies, publishes; hands off to QA/architect) ──
  # opencode, deepseek-v4-pro (not -flash): this role writes verification-grade briefs and
  # independently re-checks engineer output — reasoning quality matters more than latency here,
  # and it runs once per issue, not in a tight iterate-fast loop like an engineer.
  eng-lead:
    display_name: "Engineering Lead (code-issue orchestrator)"
    stage: "3-ready-for-dev -> 5-in-review (drives engineers; does not implement)"
    environment: "opencode"
    opencode_model: "deepseek/deepseek-v4-pro"
    opencode_mode: "primary"
    opencode_temperature: 0.15   # highly deterministic — verification-grade briefs, diff checks
    opencode_options:
      thinking:
        type: enabled
        reasoning_effort: high   # balanced reasoning (not max) — orchestrates, doesn't design
    write_scope: []   # never edits src/**, web/**, or tests/** directly — dispatch + verify only
    instructions_file: "eng_lead_instructions.md"
    skills: ["github_flow"]

  # ── Stage 0: intake ────────────────────────────────────────────────────────
  # Two intake PMs with distinct sources:
  #   pm-doc-intake — seeds epics + work issues from docs/ (plan + design docs); used to
  #                   bootstrap the assessment queue and whenever a design doc adds scope.
  #   pm-intake     — unchanged careeree-style founder-feedback intake; used later, in the
  #                   feedback/testing round, when the founder reports issues against the build.
  pm-doc-intake:
    display_name: "PM — Doc Intake (plan-driven seeding)"
    stage: "seeding: docs/ -> epics + typed work issues"
    environment: "claude-code"
    claude_model_alias: "opus"
    tools: ["Read", "Grep", "Glob", "Bash"]
    instructions_file: "pm_doc_intake_instructions.md"

  pm-intake:
    display_name: "PM — Intake (founder feedback)"
    stage: "0-intake -> 1-needs-research"
    environment: "claude-code"
    claude_model_alias: "opus"
    tools: ["Read", "Grep", "Glob", "Bash", "WebSearch"]
    instructions_file: "pm_intake_instructions.md"

  # ── Stage 1: research ──────────────────────────────────────────────────────
  researcher:
    display_name: "Technical Researcher"
    stage: "1-needs-research -> 2-needs-spec"
    environment: "claude-code"
    claude_model_alias: "sonnet"
    tools: ["Read", "Grep", "Glob", "Bash", "WebSearch", "WebFetch"]
    instructions_file: "researcher_instructions.md"

  # ── Stage 2: spec ──────────────────────────────────────────────────────────
  architect-spec:
    display_name: "Architect — Spec"
    stage: "2-needs-spec -> 3-ready-for-dev"
    environment: "opencode"
    opencode_model: "deepseek/deepseek-v4-pro"
    opencode_temperature: 0.2    # deterministic — architecture, schemas, and specs must be precise
    opencode_options:
      thinking:
        type: enabled
        reasoning_effort: max    # deep reasoning — cross-cutting architecture design warrants max effort
    tools: ["Read", "Grep", "Glob", "Bash"]
    instructions_file: "architect_spec_instructions.md"

  # ── Stage 3-4: engineers (parallel, worktrees) ─────────────────────────────
  # Tekram layout (modular monolith, see docs/00-project-management-plan.md §6): backend code in
  # src/ + tests/, optional P4 frontend demo in web/. Scopes are disjoint so both engineers can
  # run concurrently without file conflicts.
  web-engineer:
    display_name: "Web Engineer (web/, P4 bonus only)"
    stage: "3-ready-for-dev -> 5-in-review"
    environment: "opencode"
    opencode_model: "deepseek/deepseek-v4-flash"
    opencode_temperature: 0.4    # moderately creative — UI/frontend benefits from some variation
    # Conditional role: only spun up for the P4 frontend demo after all P0-P3 deliverables exist.
    write_scope: ["web/**"]
    instructions_file: "web_instructions.md"
    skills: ["github_flow"]

  backend-engineer:
    display_name: "Backend Engineer (src/)"
    stage: "3-ready-for-dev -> 5-in-review"
    environment: "opencode"
    opencode_model: "deepseek/deepseek-v4-flash"
    opencode_temperature: 0.25   # mostly deterministic — backend code needs precision, slight creativity OK
    write_scope: ["src/**", "tests/**"]
    instructions_file: "backend_instructions.md"
    skills: ["github_flow"]

  # ── Stage 5: QA ────────────────────────────────────────────────────────────
  # DECISION (founder, 2026-07-09, supersedes the 2026-07-08 Gemini/antigravity choice — TD-007):
  # QA runs on claude-code / sonnet at HIGH effort (thinking depth follows effort on this
  # runtime; there is no separate thinking knob). This exercises TD-006's own revisit trigger and
  # documented fallback: the loud-failure spike was never run, and a verified, loud-failure
  # runtime beats third-family independence on an unverified one — a silent no-op gate is worse
  # than a correlated gate. sonnet (not opus) keeps QA off the exact model that reviews it
  # (architect-review / pm-verify are opus).
  #
  # Gate independence now comes from METHOD, not model family (TD-008): QA persists a black-box
  # e2e suite per issue — one xUnit fact per acceptance criterion under tests/e2e/ — and verdicts
  # on its red/green, which is machine-checkable evidence that doesn't share a same-family
  # reviewer's blind spots. tests/e2e/** is QA's ONLY write area (prose-enforced on this runtime;
  # see sync-agents.js scopeNote).
  qa:
    display_name: "QA & Tester (e2e per AC)"
    stage: "5-in-review -> {6-qa-failed | 7-qa-passed}"
    environment: "claude-code"
    claude_model_alias: "sonnet"
    claude_effort: "high"
    tools: ["Read", "Grep", "Glob", "Bash", "Write", "Edit"]
    write_scope: ["tests/e2e/**"]
    instructions_file: "qa_instructions.md"
    skills: ["github_flow"]

  # ── Stage 5: QA — opencode/DeepSeek dual-gate (TD-009) ──────────────────────
  # DECISION (founder, 2026-07-09, TD-009): QA gets a second gate on opencode/deepseek-v4-pro as a
  # companion to the claude-code/sonnet gate above. Model-family independence returns to the QA
  # layer: sonnet (Anthropic) and deepseek-v4-pro (DeepSeek) run the same black-box e2e protocol
  # independently. Either gate passing advances the issue (dual-gate — first PASS wins).
  #
  # QA on opencode reuses the same instructions_file and skills as Claude Code QA — the protocol
  # is identical, only the runtime and model change. Unlike Claude Code where write_scope is prose
  # guidance, opencode mechanically enforces permission.edit to tests/e2e/** (hard block).
  qa-opencode:
    display_name: "QA & Tester — opencode (e2e per AC)"
    stage: "5-in-review -> {6-qa-failed | 7-qa-passed}"
    environment: "opencode"
    opencode_model: "deepseek/deepseek-v4-pro"
    opencode_mode: "primary"
    opencode_temperature: 0.15   # deterministic — test assertions must be precise
    opencode_options:
      thinking:
        type: enabled
        reasoning_effort: high   # reasoning-heavy — AC analysis and edge-case spotting
    write_scope: ["tests/e2e/**"]   # HARD enforcement on opencode — mechanically blocked elsewhere
    instructions_file: "qa_instructions.md"
    skills: ["github_flow"]

  # ── Stage 6: PM verification (HUMAN-TRIGGERED gate — decision #1) ───────────
  pm-verify:
    display_name: "PM — Verification"
    stage: "7-qa-passed -> {8-pm-rejected | 9-pm-verified}"
    environment: "claude-code"
    claude_model_alias: "opus"
    human_triggered: true   # founder / founder-supervised session runs this; NOT autonomous
    tools: ["Read", "Grep", "Glob", "Bash"]
    instructions_file: "pm_verify_instructions.md"

  # ── Stage 7: Architect code review (accept/reject) — dual-gate ────────────
  # DECISION (founder, 2026-07-10, TD-010): architect-review gets a dual-gate
  # companion on opencode/GPT-5.5 for third-family independence in the final
  # review layer. Both review the same issue independently; first ACCEPT wins
  # (whoever merges first), any REJECT sends it back. Same instructions file,
  # same protocol — only the runtime/model differs.
  architect-review:
    display_name: "Architect — Code Review"
    stage: "9-pm-verified -> {10-arch-rejected | 11-done}"
    environment: "claude-code"
    claude_model_alias: "opus"
    tools: ["Read", "Grep", "Glob", "Bash"]
    instructions_file: "architect_review_instructions.md"

  architect-review-opencode:
    display_name: "Architect — Code Review (opencode/GPT-5.5)"
    stage: "9-pm-verified -> {10-arch-rejected | 11-done}"
    environment: "opencode"
    opencode_model: "openai/gpt-5.5"
    opencode_mode: "primary"
    opencode_temperature: 0.15
    opencode_options:
      thinking:
        type: enabled
        reasoning_effort: high
    instructions_file: "architect_review_instructions.md"
    skills: ["github_flow"]

# ── Workflow constants (consumed by github_flow.sh and human readers) ─────────
workflow:
  repo: "lelkadi/tekram-delivery-assessment"
  branch_prefix: "issue-"
  worktree_roots:
    claude_code: "/Users/loukan/.agent-worktrees/tekram-delivery-assessment"
  lane_lock_dir: "/Users/loukan/.agent-worktrees/.lanes"
  concurrency: "parallel"        # MAX_LANES=3 (github_flow.sh default): per-lane ports + DB + Redis db.
                                 # type:doc issues bypass lanes entirely — they never run the stack.
                                 # Set MAX_LANES=1 to fall back to careeree's serialized v1 behavior.
  circuit_breaker_strikes: 3     # decision #4
  stale_sweep_days: 7            # decision #5
  status_labels:
    - "status:0-intake"
    - "status:1-needs-research"
    - "status:2-needs-spec"
    - "status:3-ready-for-dev"
    - "status:4-in-progress"
    - "status:5-in-review"
    - "status:6-qa-failed"
    - "status:7-qa-passed"
    - "status:8-pm-rejected"
    - "status:9-pm-verified"
    - "status:10-arch-rejected"
    - "status:11-done"
